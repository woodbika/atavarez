<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temas y recursos para preparar oposiciones.">
    <meta name="theme-color" content="#f8faf9">
    <title>OPOSAKETAK · Recursos para oposiciones</title>
    <link rel="stylesheet" href="./styles/main.css">
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#/" aria-label="OPOSAKETAK, ir a oposiciones disponibles">OPOSAKETAK</a>
        <div class="header-actions">
          <form id="header-search" class="header-search" role="search" hidden>
            <label class="sr-only" for="resource-search">Buscar recursos</label>
            <input id="resource-search" type="search" placeholder="Buscar recursos" autocomplete="off">
          </form>
          <div id="test-font-controls" class="test-font-controls" role="group" aria-label="Tamaño del texto del test" hidden>
            <button type="button" data-font-action="decrease" aria-label="Reducir el tamaño del texto" title="Reducir el tamaño del texto">A−</button>
            <button type="button" data-font-action="increase" aria-label="Aumentar el tamaño del texto" title="Aumentar el tamaño del texto">A+</button>
            <span class="sr-only test-font-status" role="status">Tamaño de texto medio</span>
          </div>
          <button id="focus-toggle" class="focus-toggle" type="button" aria-pressed="false" aria-label="Activar modo concentración" title="Activar modo concentración" hidden>
            <svg class="focus-icon focus-icon-enter" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H4a1 1 0 0 0-1 1v4M16 3h4a1 1 0 0 1 1 1v4M8 21H4a1 1 0 0 1-1-1v-4M16 21h4a1 1 0 0 0 1-1v-4"></path>
            </svg>
            <svg class="focus-icon focus-icon-exit" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 3v4a2 2 0 0 1-2 2H3M15 3v4a2 2 0 0 0 2 2h4M9 21v-4a2 2 0 0 0-2-2H3M15 21v-4a2 2 0 0 1 2-2h4"></path>
            </svg>
            <span class="sr-only focus-toggle-label">Activar modo concentración</span>
          </button>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Activar modo oscuro" title="Activar modo oscuro">
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 15.2A8.5 8.5 0 0 1 8.8 4a8.5 8.5 0 1 0 11.2 11.2Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.5"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"></path>
            </svg>
            <span class="sr-only theme-toggle-label">Activar modo oscuro</span>
          </button>
        </div>
      </div>
    </header>

    <div id="focus-backdrop" class="focus-backdrop" aria-hidden="true"></div>

    <main id="contenido" class="shell main-content" tabindex="-1">
      <p class="loading" role="status">Cargando tests…</p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
