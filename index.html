<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temas y recursos para preparar oposiciones.">
    <meta name="theme-color" content="#f8faf9">
    <title>OPOSAKETAK · Recursos para oposiciones</title>
    <link rel="stylesheet" href="./styles/main.css">
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#/" aria-label="OPOSAKETAK, ir a oposiciones disponibles">OPOSAKETAK</a>
        <div class="header-actions">
          <form id="header-search" class="header-search" role="search" hidden>
            <label class="sr-only" for="resource-search">Buscar recursos</label>
            <input id="resource-search" type="search" placeholder="Buscar recursos" autocomplete="off">
          </form>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Activar modo oscuro" title="Activar modo oscuro">
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 15.2A8.5 8.5 0 0 1 8.8 4a8.5 8.5 0 1 0 11.2 11.2Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.5"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"></path>
            </svg>
            <span class="sr-only theme-toggle-label">Activar modo oscuro</span>
          </button>
        </div>
      </div>
    </header>

    <main id="contenido" class="shell main-content" tabindex="-1">
      <p class="loading" role="status">Cargando tests…</p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
